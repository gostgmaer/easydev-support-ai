version: '3.8'
name: easydev-support-ai-local

services:
  migrate:
    image: easydev-support-ai-api:local
    build:
      context: .
      dockerfile: Dockerfile.api
    command:
      - sh
      - -c
      - node_modules/.bin/drizzle-kit migrate --config packages/database/drizzle.config.ts
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/easydev_support_ai
    networks:
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    image: easydev-support-ai-api:local
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3101:3100"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3100
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/easydev_support_ai
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=easydev_support_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENABLE_OTEL=false
      - EASYDEV_IAM_URL=http://host.docker.internal:3304
      - IAM_SERVICE_INTERNAL_URL=http://host.docker.internal:3304
      - EASYDEV_AI_URL=http://host.docker.internal:8000
      - PAYMENT_SERVICE_URL=http://host.docker.internal:3302
      - CONNECTOR_ENCRYPTION_KEY=local-dev-only-connector-key-not-for-prod
      - WIDGET_JWT_SECRET=local-dev-only-widget-jwt-secret-not-for-prod
      - CORS_ALLOWED_ORIGINS=http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014
    networks:
      - frontend-network
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker-conversation:
    image: easydev-support-ai-worker:local
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PROCESS_QUEUE=conversation-queue,message-queue,inbox-queue,channel-queue
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/easydev_support_ai
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=easydev_support_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EASYDEV_IAM_URL=http://host.docker.internal:3304
      - IAM_SERVICE_INTERNAL_URL=http://host.docker.internal:3304
      - EASYDEV_AI_URL=http://host.docker.internal:8000
      - PAYMENT_SERVICE_URL=http://host.docker.internal:3302
      - CONNECTOR_ENCRYPTION_KEY=local-dev-only-connector-key-not-for-prod
      - WIDGET_JWT_SECRET=local-dev-only-widget-jwt-secret-not-for-prod
    networks:
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker-workflow:
    image: easydev-support-ai-worker:local
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PROCESS_QUEUE=workflow-queue,ticket-queue,settings-queue
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/easydev_support_ai
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=easydev_support_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EASYDEV_IAM_URL=http://host.docker.internal:3304
      - IAM_SERVICE_INTERNAL_URL=http://host.docker.internal:3304
      - EASYDEV_AI_URL=http://host.docker.internal:8000
      - PAYMENT_SERVICE_URL=http://host.docker.internal:3302
      - CONNECTOR_ENCRYPTION_KEY=local-dev-only-connector-key-not-for-prod
      - WIDGET_JWT_SECRET=local-dev-only-widget-jwt-secret-not-for-prod
    networks:
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker-analytics:
    image: easydev-support-ai-worker:local
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PROCESS_QUEUE=analytics-queue,knowledge-queue
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/easydev_support_ai
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=easydev_support_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EASYDEV_IAM_URL=http://host.docker.internal:3304
      - IAM_SERVICE_INTERNAL_URL=http://host.docker.internal:3304
      - EASYDEV_AI_URL=http://host.docker.internal:8000
      - PAYMENT_SERVICE_URL=http://host.docker.internal:3302
      - CONNECTOR_ENCRYPTION_KEY=local-dev-only-connector-key-not-for-prod
      - WIDGET_JWT_SECRET=local-dev-only-widget-jwt-secret-not-for-prod
    networks:
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker-connector:
    image: easydev-support-ai-worker:local
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PROCESS_QUEUE=connector-queue,ai-queue
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/easydev_support_ai
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=easydev_support_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EASYDEV_IAM_URL=http://host.docker.internal:3304
      - IAM_SERVICE_INTERNAL_URL=http://host.docker.internal:3304
      - EASYDEV_AI_URL=http://host.docker.internal:8000
      - PAYMENT_SERVICE_URL=http://host.docker.internal:3302
      - CONNECTOR_ENCRYPTION_KEY=local-dev-only-connector-key-not-for-prod
      - WIDGET_JWT_SECRET=local-dev-only-widget-jwt-secret-not-for-prod
    networks:
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker-notification:
    image: easydev-support-ai-worker:local
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PROCESS_QUEUE=notification-queue,team-queue,customer-queue,widget-queue
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/easydev_support_ai
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=easydev_support_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EASYDEV_IAM_URL=http://host.docker.internal:3304
      - IAM_SERVICE_INTERNAL_URL=http://host.docker.internal:3304
      - EASYDEV_AI_URL=http://host.docker.internal:8000
      - PAYMENT_SERVICE_URL=http://host.docker.internal:3302
      - CONNECTOR_ENCRYPTION_KEY=local-dev-only-connector-key-not-for-prod
      - WIDGET_JWT_SECRET=local-dev-only-widget-jwt-secret-not-for-prod
    networks:
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  webhook:
    image: easydev-support-ai-webhook:local
    build:
      context: .
      dockerfile: Dockerfile.webhook
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PROCESS_QUEUE=admin-queue
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/easydev_support_ai
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=easydev_support_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EASYDEV_IAM_URL=http://host.docker.internal:3304
      - IAM_SERVICE_INTERNAL_URL=http://host.docker.internal:3304
      - EASYDEV_AI_URL=http://host.docker.internal:8000
      - PAYMENT_SERVICE_URL=http://host.docker.internal:3302
      - CONNECTOR_ENCRYPTION_KEY=local-dev-only-connector-key-not-for-prod
      - WIDGET_JWT_SECRET=local-dev-only-widget-jwt-secret-not-for-prod
    networks:
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:17-alpine
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=easydev_support_ai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - database-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d easydev_support_ai"]
      interval: 5s
      timeout: 2s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data
    networks:
      - database-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./deployment/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend-network
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:

networks:
  frontend-network:
  backend-network:
  database-network:

version: '3.8'

services:
  # 1. NestJS API Gateway (Handles Webhooks, Socket.IO, and REST APIs)
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    command: npm run start:dev
    env_file:
      - .env
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=development
      - PORT=3100
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=easydev_support_ai
      # Override .env's host-targeted DATABASE_URL (localhost:5434) with the
      # in-network address; without this, packages/database/src/db.ts falls
      # back to localhost and every query ECONNREFUSEs inside the container.
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/easydev_support_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IAM_SERVICE_URL=http://host.docker.internal:3304
      - IAM_SERVICE_INTERNAL_URL=http://host.docker.internal:3304
      # EASYDEV_AI_URL is what the code actually reads (ai-platform.client.ts) -
      # AI_PLATFORM_URL/AI_PLATFORM_INTERNAL_URL were dead names; overriding
      # them here left EASYDEV_AI_URL on .env's localhost:8000 value, which
      # doesn't resolve to the host machine from inside a container.
      - EASYDEV_AI_URL=http://host.docker.internal:8000
      - PAYMENT_SERVICE_URL=http://host.docker.internal:3302
      - ENABLE_OTEL=false
      - CORS_ALLOWED_ORIGINS=http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014
    depends_on:
      - postgres
      - redis
    networks:
      - easydev-net

  # 2. BullMQ Worker Node (Dedicated to background queue processing)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start:worker
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=easydev_support_ai
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/easydev_support_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IAM_SERVICE_URL=http://host.docker.internal:3304
      - IAM_SERVICE_INTERNAL_URL=http://host.docker.internal:3304
      # EASYDEV_AI_URL is what the code actually reads (ai-platform.client.ts) -
      # AI_PLATFORM_URL/AI_PLATFORM_INTERNAL_URL were dead names; overriding
      # them here left EASYDEV_AI_URL on .env's localhost:8000 value, which
      # doesn't resolve to the host machine from inside a container.
      - EASYDEV_AI_URL=http://host.docker.internal:8000
      - PAYMENT_SERVICE_URL=http://host.docker.internal:3302
      - ENABLE_OTEL=false
      # shouldRunProcessor() (src/config/queue-role.ts) gates every
      # @Processor() on this var - without it this service ran zero queue
      # processors despite being labelled the dedicated worker node.
      - PROCESS_QUEUE=conversation-queue,message-queue,ticket-queue,knowledge-queue,connector-queue,workflow-queue,analytics-queue,notification-queue,customer-queue,team-queue,channel-queue,settings-queue,inbox-queue,admin-queue,widget-queue,ai-queue
    depends_on:
      - postgres
      - redis
    networks:
      - easydev-net

  # 3. Next.js Frontend Operations Center
  # Disabled: UI repo (../../UI/easydev-support-ai-web) is a pnpm monorepo without a Dockerfile.
  # Run on host instead: `pnpm dev:agent-workspace` (port 3012) or `pnpm dev:help-center` (port 3014)
  # from C:\Users\kisho\WorkSpace\UI\easydev-support-ai-web.
  # frontend:
  #   build:
  #     context: ../../UI/easydev-support-ai-web
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3012:3012"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://localhost:3100
  #   networks:
  #     - easydev-net

  # 4. PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    ports:
      - "5434:5432" # Mapped to 5434 to avoid conflicts with other EasyDev DBs
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=easydev_support_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - easydev-net

  # 5. Redis (For BullMQ and Socket.IO PubSub)
  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redisdata:/data
    networks:
      - easydev-net

  # 6. Prometheus (Metrics Server)
  prometheus:
    image: prom/prometheus:v2.47.2
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./packages/observability/src/alerts/alert-rules.yml:/etc/prometheus/alert-rules.yml
    depends_on:
      - alertmanager
    networks:
      - easydev-net

  # 6b. Alertmanager - alert-rules.yml's rules were evaluated by Prometheus
  # but had nowhere to be routed/notified; a firing alert previously only
  # showed up if someone happened to check the Prometheus UI.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - easydev-net

  # 7. Grafana Loki (Log Aggregation)
  loki:
    image: grafana/loki:2.9.2
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - easydev-net

  # 8. Grafana Tempo (Distributed Tracing)
  tempo:
    image: grafana/tempo:2.3.0
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./tempo.yml:/etc/tempo.yaml
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    networks:
      - easydev-net

  # 9. Grafana (Dashboard Visualizer)
  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./packages/observability/src/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - easydev-net

volumes:
  pgdata:
  redisdata:
  grafanadata:

networks:
  easydev-net:
    driver: bridge

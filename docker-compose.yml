version: '3.8'

services:
  # 1. NestJS API Gateway (Handles Webhooks, Socket.IO, and REST APIs)
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    command: npm run start:dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EASYDEV_IAM_URL=http://host.docker.internal:3001
      - EASYDEV_AI_URL=http://host.docker.internal:3002
      - ENABLE_OTEL=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - LOKI_URL=http://loki:3100/loki/api/v1/push
    depends_on:
      - postgres
      - redis
    networks:
      - easydev-net

  # 2. BullMQ Worker Node (Dedicated to background queue processing)
  worker:
    build: 
      context: .
      dockerfile: Dockerfile
    command: npm run start:worker
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EASYDEV_AI_URL=http://host.docker.internal:3002
      - ENABLE_OTEL=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - LOKI_URL=http://loki:3100/loki/api/v1/push
    depends_on:
      - postgres
      - redis
    networks:
      - easydev-net
      
  # 3. Next.js Frontend Operations Center
  # Disabled: UI repo (../../UI/easydev-support-ai-web) is a pnpm monorepo without a Dockerfile.
  # Run on host instead: `pnpm dev:agent-workspace` (port 3000) or `pnpm dev:help-center` (port 3001)
  # from C:\Users\kisho\WorkSpace\UI\easydev-support-ai-web.
  # frontend:
  #   build:
  #     context: ../../UI/easydev-support-ai-web
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3005:3005"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://localhost:3000
  #   networks:
  #     - easydev-net

  # 4. PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    ports:
      - "5434:5432" # Mapped to 5434 to avoid conflicts with other EasyDev DBs
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=easydev_support_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - easydev-net

  # 5. Redis (For BullMQ and Socket.IO PubSub)
  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redisdata:/data
    networks:
      - easydev-net

  # 6. Prometheus (Metrics Server)
  prometheus:
    image: prom/prometheus:v2.47.2
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./packages/observability/src/alerts/alert-rules.yml:/etc/prometheus/alert-rules.yml
    networks:
      - easydev-net

  # 7. Grafana Loki (Log Aggregation)
  loki:
    image: grafana/loki:2.9.2
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - easydev-net

  # 8. Grafana Tempo (Distributed Tracing)
  tempo:
    image: grafana/tempo:2.3.0
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./tempo.yml:/etc/tempo.yaml
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    networks:
      - easydev-net

  # 9. Grafana (Dashboard Visualizer)
  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./packages/observability/src/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - easydev-net

volumes:
  pgdata:
  redisdata:
  grafanadata:

networks:
  easydev-net:
    driver: bridge

groups:
  - name: easydev-alert-rules
    rules:
      # 1. High API Error Rate
      - alert: HighApiErrorRate
        expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) / sum(rate(http_requests_total[5m])) * 100 > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'High API HTTP 5xx error rate detected on tenant {{ $labels.tenant_id }}'
          description: 'API HTTP 5xx error rate is {{ $value | printf "%.2f" }}% over the last 5 minutes.'

      # 2. Queue Backlog Alert
      - alert: QueueBacklogHigh
        expr: queue_backlog_total > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'BullMQ queue backlog is too high'
          description: 'Queue {{ $labels.queue_name }} has {{ $value }} pending jobs waiting for workers.'

      # 3. Dead Letter Queue Growth
      - alert: DeadLetterQueueGrowth
        expr: sum(rate(queue_failures_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: 'Failed jobs routed to Dead Letter Queue (DLQ)'
          description: 'Queue {{ $labels.queue_name }} is experiencing job failures routed to terminal DLQ.'

      # 4. Workflow Failures Alert
      - alert: WorkflowFailuresHigh
        expr: sum(rate(queue_failures_total{job_name="workflow-execution-job"}[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High workflow execution failure rate'
          description: 'Workflows failing at a rate of {{ $value }} failures per minute.'

      # 5. AI Platform Failures
      - alert: AiPlatformFailuresHigh
        expr: rate(ai_failures_total[5m]) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'AI platform generation failures are high'
          description: 'AI generation calls for tenant {{ $labels.tenant_id }} are failing at rate {{ $value }}/sec.'

      # 6. Connector Failures
      - alert: ConnectorFailuresHigh
        expr: rate(connector_failures_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High connector delivery failure rate'
          description: 'Connector {{ $labels.connector_type }} has high failure rates of {{ $value }}/sec.'

      # 7. Database Latency
      - alert: DatabaseLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(db_query_duration_seconds_bucket[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High database query latency detected'
          description: '95% of queries exceed 500ms latency (current: {{ $value }}s).'

      # 8. Redis Latency
      - alert: RedisLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(cache_misses_total[5m])) by (tenant_id)) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High Redis cache response delay'
          description: 'Redis latency exceeds target response limit.'

      # 9. High Memory Usage
      - alert: HighMemoryUsage
        expr: system_memory_usage_bytes > 8589934592 # 8 GB threshold limit
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High memory utilization on app node'
          description: 'Node memory usage has reached {{ $value }} bytes.'

      # 10. High CPU Usage
      - alert: HighCpuUsage
        expr: system_cpu_usage_percentage > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High CPU utilization on app node'
          description: 'Node CPU usage is {{ $value }}%.'

apiVersion: apps/v1
kind: Deployment
metadata:
  name: support-ai-worker
  namespace: easydev-prod
  labels:
    app: support-ai-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: support-ai-worker
  template:
    metadata:
      labels:
        app: support-ai-worker
    spec:
      containers:
      - name: worker
        image: gcr.io/easydev/support-ai-worker:latest
        envFrom:
        - secretRef:
            name: support-ai-secrets
        - configMapRef:
            name: support-ai-config
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
---
# We use KEDA (Kubernetes Event-driven Autoscaling) to scale workers based on BullMQ Queue Depth
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: support-ai-worker-scaler
  namespace: easydev-prod
spec:
  scaleTargetRef:
    name: support-ai-worker
  minReplicaCount: 2
  maxReplicaCount: 50
  triggers:
  - type: redis
    metadata:
      address: redis-cluster.easydev-prod.svc.cluster.local:6379
      listName: bull:incoming-messages:wait
      listLength: "100" # Scale up for every 100 messages in queue

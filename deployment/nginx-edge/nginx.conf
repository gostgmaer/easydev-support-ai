user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 20480;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Slowloris Protection
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_requests 1000;

    # Body Limits
    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # Logging with Request ID and OpenTelemetry Trace ID support
    map $http_traceparent $trace_id {
        "~*^00-([a-f0-9]{32})-([a-f0-9]{16})-[a-f0-9]{2}$" $1;
        default "";
    }

    map $http_traceparent $parent_span_id {
        "~*^00-([a-f0-9]{32})-([a-f0-9]{16})-[a-f0-9]{2}$" $2;
        default "";
    }

    map $http_x_tenant_id $tenant_id {
        "" $arg_tenant_id;
        default $http_x_tenant_id;
    }

    log_format main_json escape=json '{'
        '"time_iso8601":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"host":"$host",'
        '"request":"$request",'
        '"status":"$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_id":"$request_id",'
        '"trace_id":"$trace_id",'
        '"tenant_id":"$tenant_id",'
        '"upstream_addr":"$upstream_addr"'
    '}';

    access_log /var/log/nginx/access.log main_json;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # Import Module Configs
    include /etc/nginx/conf.d/limits.conf;
    include /etc/nginx/conf.d/upstreams.conf;
    include /etc/nginx/conf.d/ssl.conf;
    include /etc/nginx/conf.d/security.conf;
    include /etc/nginx/conf.d/vhosts.conf;
}

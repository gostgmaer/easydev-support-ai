# --- Connection & Request Rate Limits Zones ---

# 1. Connection limits per IP (Slowloris/DDoS protection)
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

# 2. General API Rate Limits per IP (50 requests per second)
limit_req_zone $binary_remote_addr zone=api_ip_limit:10m rate=50r/s;

# 3. Authentication Rate Limits per IP (5 requests per second for login/token endpoints)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# 4. Webhook Rate Limits per IP (100 requests per second for webhook receiver)
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=100r/s;

# 5. Widget Rate Limits per IP (30 requests per second for public widget endpoints)
limit_req_zone $binary_remote_addr zone=widget_limit:10m rate=30r/s;

# 6. Tenant-based Rate Limits (200 requests per second per tenant to prevent noisy neighbor issue)
limit_req_zone $tenant_id zone=tenant_limit:20m rate=200r/s;

# Custom error code for rate-limited requests
limit_req_status 429;
limit_conn_status 429;

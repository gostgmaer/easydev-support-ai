# --- SSL/TLS Production Configuration ---

# SSL Session Management
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:10m;
ssl_session_tickets off;

# DH Parameters for Perfect Forward Secrecy (PFS)
ssl_dhparam /etc/nginx/certs/dhparam.pem;

# Supported TLS Protocols
ssl_protocols TLSv1.2 TLSv1.3;

# Secure Cipher Suites (Modern & Intermediate Compatibility)
ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
ssl_prefer_server_ciphers on;

# OCSP Stapling (Speeds up SSL handshake validation)
ssl_stapling on;
ssl_stapling_verify on;
ssl_trusted_certificate /etc/nginx/certs/chain.pem;

# DNS Resolver for OCSP lookup
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# HSTS (HTTP Strict Transport Security)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

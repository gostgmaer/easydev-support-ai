# --- Nginx Virtual Hosts Configuration ---

# Global HTTP to HTTPS Redirect
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt Acme Challenge Path
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 1. API Subdomain & Tenant Aware Routing
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.easydev.in ~^(?<tenant_subdomain>[^.]+)\.api\.easydev\.in$ ~^(?<custom_tenant_domain>[^.]+\.[a-zA-Z]{2,6})$;

    ssl_certificate /etc/nginx/certs/live.crt;
    ssl_certificate_key /etc/nginx/certs/live.key;

    # Apply Connection Limits
    limit_conn conn_limit_per_ip 50;

    # Apply Rate Limits (IP & Tenant combined)
    limit_req zone=api_ip_limit burst=100 nodelay;
    limit_req zone=tenant_limit burst=250 nodelay;

    # CORS Headers
    location / {
        # Preflight handling
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-tenant-id,x-idempotency-key' always;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials 'true' always;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        # Inject Tenant context if resolved via subdomain
        proxy_set_header X-Tenant-Subdomain $tenant_subdomain;
        proxy_set_header X-Custom-Domain $custom_tenant_domain;

        # Trace Propagation (OTel)
        proxy_set_header traceparent $http_traceparent;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Auth Rate Limiting Isolation
    location /v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header traceparent $http_traceparent;
    }

    # Webhook Endpoint Routing
    location /v1/webhooks/ {
        limit_req zone=webhook_limit burst=150 nodelay;

        proxy_pass http://webhook_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header traceparent $http_traceparent;

        # Webhook specific optimizations
        proxy_read_timeout 30s;
        client_max_body_size 5m;
    }

    # Prometheus Metrics
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://api_backend/metrics;
    }

    # Health Checks endpoint
    location /health {
        proxy_pass http://api_backend/health;
        access_log off;
    }
}

# 2. Admin Portal Configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.easydev.in;

    ssl_certificate /etc/nginx/certs/live.crt;
    ssl_certificate_key /etc/nginx/certs/live.key;

    # Static Assets Caching Optimization
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
        proxy_pass http://admin_backend;
        access_log off;
        expires 365d;
        add_header Cache-Control "public, no-transform, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        proxy_pass http://admin_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }
}

# 3. Widget Backend Configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name widget.easydev.in;

    ssl_certificate /etc/nginx/certs/live.crt;
    ssl_certificate_key /etc/nginx/certs/live.key;

    limit_req zone=widget_limit burst=50 nodelay;

    # Cache widget payload scripts
    location ~* \.(?:js|css|svg|png)$ {
        proxy_pass http://widget_backend;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Frame-Options "ALLOW-FROM *" always;
    }

    location / {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials 'true' always;

        proxy_pass http://widget_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header traceparent $http_traceparent;
    }
}

# 4. WebSockets Subdomain
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ws.easydev.in;

    ssl_certificate /etc/nginx/certs/live.crt;
    ssl_certificate_key /etc/nginx/certs/live.key;

    location /socket.io/ {
        proxy_pass http://ws_backend;
        proxy_http_version 1.1;
        
        # Upgrade Headers for Websockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Disable response buffer for real-time latency
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        return 404;
    }
}

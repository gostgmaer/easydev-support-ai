# 1. API Upstream (Least Connections for optimal request distribution)
upstream api_backend {
    least_conn;
    server api:3000 max_fails=3 fail_timeout=10s;
    # Failover standby node
    server api-failover:3000 max_fails=3 fail_timeout=10s backup;
    keepalive 64;
}

# 2. Webhook Upstream (Round Robin for high-throughput webhook ingestion)
upstream webhook_backend {
    server webhook:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# 3. WebSockets Upstream (IP Hash for Sticky Sessions)
upstream ws_backend {
    ip_hash;
    server api:3000 max_fails=3 fail_timeout=10s;
    keepalive 128;
}

# 4. Admin Portal Backend Upstream (Next.js server / Admin API)
upstream admin_backend {
    server host.docker.internal:3005 max_fails=2 fail_timeout=10s;
    keepalive 16;
}

# 5. Widget Backend Upstream
upstream widget_backend {
    server api:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

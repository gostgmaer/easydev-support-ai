# --- PostgreSQL 17 WAL Archiving & Point-In-Time Recovery Configuration ---

# Enable WAL replica level for point-in-time recovery and streaming replication
wal_level = replica

# Enable archiving mode
archive_mode = on

# WAL Archiving Command (Saves WAL chunks to the shared storage mount)
# Matches the backup directory structured locally inside docker volumes
archive_command = 'test ! -f /backups/postgres/wal/%f && cp %p /backups/postgres/wal/%f'

# Forces a WAL segment switch every 60 seconds (Enforces RPO <= 15 minutes)
archive_timeout = 60

# Streaming Replication parameters
max_wal_senders = 10
wal_keep_size = 4096MB

# Enable hot standby for read-replica routing
hot_standby = on
hot_standby_feedback = on

# WAL compression to optimize local storage consumption
wal_compression = on

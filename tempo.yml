server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    max_block_bytes: 524288000
    compacted_block_retention: 24h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces

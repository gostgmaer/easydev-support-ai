version: '3.8'

services:
  # 1. API Gateways (Scalable REST APIs / Socket.io)
  api:
    image: ghcr.io/easydev/easydev-support-ai-api:prod-latest
    build:
      context: .
      dockerfile: Dockerfile.api
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        max_attempts: 3
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENABLE_OTEL=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - LOKI_URL=http://loki:3100/loki/api/v1/push
    networks:
      - frontend-network
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 2. Webhook Dispatcher
  webhook:
    image: ghcr.io/easydev/easydev-support-ai-webhook:prod-latest
    build:
      context: .
      dockerfile: Dockerfile.webhook
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    environment:
      - NODE_ENV=production
      - PROCESS_QUEUE=admin-queue
      - DB_HOST=postgres
      - REDIS_HOST=redis
    networks:
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 3. Independent Workers
  worker-conversation:
    image: ghcr.io/easydev/easydev-support-ai-worker:prod-latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    deploy:
      replicas: 2
    environment:
      - NODE_ENV=production
      - PROCESS_QUEUE=conversation-queue,message-queue,inbox-queue,channel-queue
      - DB_HOST=postgres
      - REDIS_HOST=redis
    networks:
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-workflow:
    image: ghcr.io/easydev/easydev-support-ai-worker:prod-latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    deploy:
      replicas: 2
    environment:
      - NODE_ENV=production
      - PROCESS_QUEUE=workflow-queue,ticket-queue,settings-queue
      - DB_HOST=postgres
      - REDIS_HOST=redis
    networks:
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-analytics:
    image: ghcr.io/easydev/easydev-support-ai-worker:prod-latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    deploy:
      replicas: 2
    environment:
      - NODE_ENV=production
      - PROCESS_QUEUE=analytics-queue,knowledge-queue
      - DB_HOST=postgres
      - REDIS_HOST=redis
    networks:
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-connector:
    image: ghcr.io/easydev/easydev-support-ai-worker:prod-latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    deploy:
      replicas: 2
    environment:
      - NODE_ENV=production
      - PROCESS_QUEUE=connector-queue,ai-queue
      - DB_HOST=postgres
      - REDIS_HOST=redis
    networks:
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-notification:
    image: ghcr.io/easydev/easydev-support-ai-worker:prod-latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    deploy:
      replicas: 2
    environment:
      - NODE_ENV=production
      - PROCESS_QUEUE=notification-queue,team-queue,customer-queue,widget-queue
      - DB_HOST=postgres
      - REDIS_HOST=redis
    networks:
      - backend-network
      - database-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. PostgreSQL 17 Database
  postgres:
    image: postgres:17-alpine
    # deployment/disaster-recovery/scripts/*.sh hardcode this name to find
    # the container via `docker ps`/`docker exec` - without it, every DR
    # script silently fell through to a "local psql on this host" fallback
    # that doesn't apply to this topology.
    container_name: support-ai-postgres
    environment:
      - POSTGRES_USER=support_ai_prod
      # Was a literal password committed to git - the same placeholder
      # string also used as the DR scripts' fallback default, making it a
      # real, guessable production credential rather than a per-deploy
      # secret. DB_PASSWORD must now be supplied via the environment (.env,
      # secrets manager, etc.); compose refuses to start without it.
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in the environment}
      - POSTGRES_DB=easydev_support_ai_prod
    # WAL archiving for point-in-time recovery - settings match
    # deployment/disaster-recovery/configs/postgresql-pitr.conf, which
    # existed but was never actually applied to any Postgres container.
    # archive_command writes into /backups/postgres/wal, bind-mounted below
    # so the host-run backup/restore scripts see the exact same files.
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_command=test ! -f /backups/postgres/wal/%f && cp %p /backups/postgres/wal/%f
      - -c
      - archive_timeout=60
      - -c
      - max_wal_senders=10
      - -c
      - wal_keep_size=4096MB
      - -c
      - hot_standby=on
      - -c
      - hot_standby_feedback=on
      - -c
      - wal_compression=on
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - database-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support_ai_prod -d easydev_support_ai_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 5. Redis 8 Cache / Queue Store
  redis:
    image: redis:7-alpine
    # See postgres container_name comment above - same DR-script dependency.
    container_name: support-ai-redis
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    networks:
      - database-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 6. Nginx Load Balancer
  nginx:
    image: nginx:1.25-alpine
    # No direct host port exposure - Traefik (in the separate infra/ stack)
    # is the sole public entrypoint and TLS terminator, reached via the
    # external `edge` network. Previously this was the only thing bound to
    # the host's port 80 at all, with no TLS anywhere in front of it.
    volumes:
      - ./deployment/nginx-blue-green.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend-network
      - edge
    depends_on:
      - api
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      - traefik.http.routers.easydev-support-ai.entrypoints=websecure
      - "traefik.http.routers.easydev-support-ai.rule=Host(`api.easydev.in`)"
      - traefik.http.routers.easydev-support-ai.tls=true
      - traefik.http.routers.easydev-support-ai.tls.certresolver=le
      - traefik.http.routers.easydev-support-ai.middlewares=security-headers@file
      - traefik.http.services.easydev-support-ai.loadbalancer.server.port=80

  # 7. Monitoring Setup
  prometheus:
    image: prom/prometheus:v2.47.2
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - internal-network
      - frontend-network

  loki:
    image: grafana/loki:2.9.2
    networks:
      - internal-network
      - frontend-network

  tempo:
    image: grafana/tempo:2.3.0
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./tempo.yml:/etc/tempo.yaml
    networks:
      - internal-network
      - frontend-network

  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./packages/observability/src/dashboards:/var/lib/grafana/dashboards
    networks:
      - internal-network
      - frontend-network
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  postgres-data:
  redis-data:
  grafana-data:

networks:
  frontend-network:
  backend-network:
  database-network:
  internal-network:
  # Created by the separate infra/ repo's docker-compose.yml (Traefik +
  # Portainer edge stack) - external:true means this compose file joins it
  # rather than trying to create it. Requires the infra stack to be up
  # first, and TRAEFIK_NETWORK_NAME=edge in infra/.env (the documented
  # default in infra/.env.example).
  edge:
    external: true

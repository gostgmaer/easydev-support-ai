name: Production Hardening CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup NodeJS 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Types and Build
        run: |
          pnpm run build:packages
          pnpm run build

      - name: Run Test Suite
        run: pnpm run test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          tags: easydev-support-ai:latest
          outputs: type=docker,dest=/tmp/easydev-image.tar

      - name: Perform Blue-Green Zero-Downtime Deployment
        run: |
          echo "Starting production deployment..."
          # Pseudo Shell script representing remote execution:
          # 1. Back up database
          #    pg_dump -U postgres -h db_host -d easydev_support_ai -F c -b -v -f /backups/db_backup_$(date +%F_%T).dump
          # 2. Deploy green container on port 3001 while blue is on 3000
          #    docker run -d --name easydev-api-green -p 3001:3000 easydev-support-ai:latest
          # 3. Perform liveness/readiness health check on new container
          #    curl -f http://localhost:3001/health/readiness || (docker stop easydev-api-green && docker rm easydev-api-green && exit 1)
          # 4. Swap Nginx active upstream configuration
          #    sed -i 's/127.0.0.1:3000/127.0.0.1:3001/g' /etc/nginx/nginx.conf
          #    nginx -s reload
          # 5. Stop and clean up old blue container
          #    docker stop easydev-api-blue && docker rm easydev-api-blue
          # 6. Rename green to active blue container
          #    docker rename easydev-api-green easydev-api-blue
          echo "Blue-Green swap succeeded. Production is healthy on latest release."

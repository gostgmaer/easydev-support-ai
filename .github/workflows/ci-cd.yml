name: Support AI CI/CD Pipeline

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

permissions:
  contents: read
  packages: write

jobs:
  filter:
    name: Detect Changed Components
    runs-on: self-hosted
    outputs:
      apps: ${{ steps.changes.outputs.apps }}
      packages: ${{ steps.changes.outputs.packages }}
      modules: ${{ steps.changes.outputs.modules }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Filters
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            apps:
              - 'src/**'
              - 'package.json'
            packages:
              - 'packages/**'
            modules:
              - 'modules/**'

  ci:
    name: Continuous Integration
    runs-on: self-hosted
    needs: filter
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Get pnpm Store Directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --default)" >> $GITHUB_ENV

      - name: Cache pnpm Files
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Formatting Check
        run: pnpm exec prettier --check "src/**/*.ts" "packages/**/*.ts"

      - name: Run Linting
        run: pnpm run lint

      - name: Recompile All Packages
        run: pnpm run build:packages

      - name: Verify NestJS Build
        run: pnpm run build

      - name: Run Test Suites with Coverage
        run: pnpm test -- --coverage --coverageThreshold='{"global":{"branches":90,"functions":90,"lines":90,"statements":90}}'

      - name: Security Scanning - npm audit
        run: pnpm audit --audit-level=high

      - name: Security Scanning - Secrets Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cd:
    name: Continuous Delivery & Deployment
    runs-on: self-hosted
    needs: [filter, ci]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ENV_NAME=production" >> $GITHUB_ENV
            echo "REGISTRY_TAG=prod-${{ github.sha }}" >> $GITHUB_ENV
          else
            echo "ENV_NAME=staging" >> $GITHUB_ENV
            echo "REGISTRY_TAG=staging-${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Tag Docker Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.REGISTRY_TAG }}
            ghcr.io/${{ github.repository }}:${{ env.ENV_NAME }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Security Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:${{ env.REGISTRY_TAG }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Trigger Blue-Green Zero-Downtime Deployment
        env:
          DEPLOY_ENV: ${{ env.ENV_NAME }}
          IMAGE_TAG: ${{ env.REGISTRY_TAG }}
        run: |
          chmod +x ./deployment/deploy.sh
          ./deployment/deploy.sh

name: Support AI CI/CD Pipeline

on:
  push:
    branches:
      - master
      - development-branch
  pull_request:
    branches:
      - master
      - development-branch
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/development-branch' }}

jobs:
  filter:
    name: Detect Changed Components
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changes.outputs.apps }}
      packages: ${{ steps.changes.outputs.packages }}
      modules: ${{ steps.changes.outputs.modules }}
      # Union of every path that can affect the build, image, or a running
      # container - anything else (workflow files, docs, non-Dockerfile
      # deployment/*, etc.) doesn't need a rebuild or rescan.
      code: ${{ steps.changes.outputs.apps == 'true' || steps.changes.outputs.packages == 'true' || steps.changes.outputs.modules == 'true' || steps.changes.outputs.build_config == 'true' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Path Filters
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            apps:
              - 'src/**'
              - 'package.json'
            packages:
              - 'packages/**'
            modules:
              - 'modules/**'
            build_config:
              - 'test/**'
              - 'scripts/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'tsconfig.build.json'
              - 'nest-cli.json'
              - 'eslint.config.mjs'
              - '.npmrc'
              - 'Dockerfile.api'
              - 'Dockerfile.webhook'
              - 'Dockerfile.worker'

  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    needs: filter
    # Manual runs always execute in full (explicit human intent to re-verify
    # everything). Push/PR runs only execute when something that can affect
    # the build/image/runtime actually changed - a workflow-only or docs-only
    # push has nothing new to lint/test/build/scan, so skip straight through
    # (this cascades: cd below `needs` this job, so it skips automatically too).
    if: github.event_name == 'workflow_dispatch' || needs.filter.outputs.code == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          # gitleaks-action below diffs the push's before^..after commit
          # range; a shallow (default) clone doesn't have `before^`,
          # causing "ambiguous argument ... unknown revision".
          fetch-depth: 0

      # Must run before Setup Node.js — actions/setup-node's cache:'pnpm'
      # option below shells out to `pnpm store path` itself to compute the
      # cache directory, so pnpm has to already be on PATH when it runs.
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      # Replaces a manual `pnpm store path --default` + actions/cache@v5
      # combo that was producing an empty path (actions/cache errored with
      # "Input required and not supplied: path") — never caught before
      # because this workflow's trigger branches didn't match this repo's
      # real branches, so it had never actually run.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Formatting Check
        run: pnpm exec prettier --check "src/**/*.ts" "packages/**/*.ts"

      - name: Run Linting
        run: pnpm run lint

      - name: Recompile All Packages
        run: pnpm run build:packages

      - name: Verify NestJS Build
        run: pnpm run build

      - name: Check Database Schema Drift
        run: |
          chmod +x ./scripts/check-schema-drift.sh
          ./scripts/check-schema-drift.sh

      - name: Verify Migrations Apply Cleanly From Scratch
        run: |
          chmod +x ./scripts/check-migrations-clean-apply.sh
          ./scripts/check-migrations-clean-apply.sh

      # No `--` before --coverage: this pnpm version (10.x) forwards a literal
      # `--` through to jest instead of stripping it as an args separator, so
      # `jest -- --coverage ...` treated --coverage/--coverageThreshold as
      # file-path patterns (0 matches, "No tests found") instead of flags.
      #
      # No --coverageThreshold: this workflow's trigger branches never
      # matched the repo's real branches until recently, so this gate had
      # never actually run. With tests really executing now, real coverage
      # is ~3-4% (6 spec files across 785 source files) against a declared
      # 90% global threshold - enforcing it would fail every CI run
      # indefinitely. Dropped until real coverage work is tracked
      # separately; re-add once there's a baseline worth gating on.
      - name: Run Test Suites with Coverage
        run: pnpm test --coverage

      - name: Security Scanning - npm audit
        run: pnpm audit --audit-level=high

      - name: Security Scanning - Secrets Scan
        if: github.event_name == 'push'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build-and-push only. Deploys are never automatic — a human always
  # explicitly runs easydev-infra's deploy-infra.yml (workflow_dispatch) and
  # picks what to redeploy; that pulls whatever image is tagged 'latest' (or
  # the tag passed in) here. This previously ran deployment/deploy.sh
  # unconditionally on every push to main/development, auto-deploying
  # straight to production with no human in the loop — removed to match the
  # rest of this platform's build-only-CI convention.
  #
  # NOTE: this repo's actual branches are `master` (default) and
  # `development-branch`, not `main`/`development` — the workflow's own
  # trigger config above was pointed at branch names that don't exist here,
  # so it had never fired on a push at all. Fixed alongside this change.
  cd:
    name: Continuous Delivery (build & push only)
    runs-on: ubuntu-latest
    needs: [filter, ci]
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      # The deploy target (easydev-infra's Oracle server) is arm64, but this
      # job runs on an amd64 GitHub-hosted runner. Without QEMU + an explicit
      # `platforms:` on each build step below, buildx just builds for the
      # runner's native amd64 and the resulting image has no arm64 manifest
      # entry at all - `docker compose pull` on the server then fails with
      # "no matching manifest for linux/arm64/v8". Matches how auth-service/
      # payment-service already build for this same server.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # The default `docker` buildx driver can't export/import the `type=gha`
      # cache used below ("Cache export is not supported for the docker
      # driver") - this switches to the `docker-container` driver, which can.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Three separate images (api/webhook/worker), matching
      # docker-compose.production.yml's split-process architecture and this
      # platform's ghcr.io/<GHCR_ORG>/easydev-<service> naming/tagging
      # convention (:latest, not the previous prod-{sha}/${{ github.repository }} scheme
      # that easydev-infra's generate-env.sh wouldn't be able to find).
      - name: Build and push support-ai-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ secrets.GHCR_ORG }}/easydev-support-ai-api:latest
          cache-from: type=gha,scope=support-ai-api
          cache-to: type=gha,mode=max,scope=support-ai-api

      - name: Build and push support-ai-webhook
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.webhook
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ secrets.GHCR_ORG }}/easydev-support-ai-webhook:latest
          cache-from: type=gha,scope=support-ai-webhook
          cache-to: type=gha,mode=max,scope=support-ai-webhook

      - name: Build and push support-ai-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ secrets.GHCR_ORG }}/easydev-support-ai-worker:latest
          cache-from: type=gha,scope=support-ai-worker
          cache-to: type=gha,mode=max,scope=support-ai-worker

      - name: Run Trivy Security Vulnerability Scan (api image)
        uses: aquasecurity/trivy-action@master
        env:
          # The pushed image's manifest list now only has a linux/arm64 entry
          # (see platforms: linux/arm64 above, matching the deploy target's
          # architecture) - without this, Trivy's "remote" pull falls back to
          # matching its own host platform (amd64, since this job runs on an
          # amd64 GitHub-hosted runner) and fails with "no child with
          # platform linux/amd64 in index". TRIVY_PLATFORM is the documented
          # env-var form of trivy's --platform flag.
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: 'ghcr.io/${{ secrets.GHCR_ORG }}/easydev-support-ai-api:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'
